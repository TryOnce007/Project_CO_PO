<!DOCTYPE html>
<html>
<head>
  <title>Professor Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container mt-4">
    <div class="top-bar">
      <h2>Welcome, {{ professor.username }}</h2>


      <div class="dropdown">
        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          👤
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="{{ url_for('profile.profile') }}">Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}">Logout</a></li>

        </ul>
      </div>
    </div>

    <p>This is your professor dashboard. You can add more features here like CO-PO mapping, reports, etc.</p>

    <div class="mt-3">
      <a href="{{ url_for('auth.index') }}" class="btn btn-primary">Enter into Portal</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
