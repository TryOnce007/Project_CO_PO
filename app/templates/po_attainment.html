<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PO Attainment</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #f8f9fa;
    }

    .container-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      margin-top: 40px;
    }

    .chart-container {
      position: relative;
      width: 100%;
      height: 400px;
    }

    @media (max-width: 768px) {
      .chart-container {
        height: 280px;
      }
    }

    .no-data {
      text-align: center;
      padding: 50px;
      color: #888;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="container-box">

      <h3 class="text-center mb-4">
        PO Attainment Levels (Based on CO Mapping)
      </h3>

      {% if po_stats %}
      <div class="chart-container">
        <canvas id="poChart"></canvas>
      </div>
      {% else %}
      <div class="no-data">
        No data available for selected filters
      </div>
      {% endif %}

      <div class="mt-4 text-end">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">
          ← Back to Dashboard
        </a>
      </div>

    </div>
  </div>

  <script>
    {% if po_stats %}

    const ctx = document.getElementById('poChart').getContext('2d');

    const labels = [
      {% for ps in po_stats %}
        'PO{{ ps.po.id }}',
      {% endfor %}
    ];

    const data = [
      {% for ps in po_stats %}
        {{ ps.avg_level }},
      {% endfor %}
    ];

    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [{
          label: 'PO Attainment Level',
          data: data,
          fill: true,
          backgroundColor: 'rgba(54,162,235,0.3)',
          borderColor: 'rgba(54,162,235,1)',
          pointBackgroundColor: 'rgba(54,162,235,1)',
          pointRadius: 5,
          pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

        interaction: {
          mode: 'nearest',
          intersect: true
        },

        scales: {
          r: {
            min: 0,
            max: 3,
            ticks: {
              stepSize: 1,
              backdropColor: 'transparent'
            },
            grid: {
              color: '#ddd'
            }
          }
        },

        plugins: {
          legend: {
            position: 'top'
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return 'Level: ' + context.raw;
              }
            }
          }
        },

        animation: {
          duration: 1000,
          easing: 'easeInOutQuart'
        }
      }
    });

    {% endif %}
  </script>
</body>
</html>
