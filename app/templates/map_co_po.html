<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map CO to PO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-4">Map Course Outcome (CO) to Program Outcome (PO)</h3>

    <form method="POST">


      <div class="mb-3">
        <label class="form-label">Select Course</label>
        <select name="course_id"
                class="form-select"
                required
                onchange="this.form.submit()">
          <option value="">Select Course</option>
          {% for course in courses %}
          <option value="{{ course.id }}"
            {% if selected_course_id and selected_course_id|int == course.id %}
              selected
            {% endif %}>
            {{ course.code }} - {{ course.name }}
          </option>
          {% endfor %}
        </select>
      </div>


      <div class="mb-3">
        <label class="form-label">Select CO</label>
        <select name="co_id" class="form-select">
          <option value="">Select CO</option>
          {% for co in cos %}
          <option value="{{ co.id }}">{{ co.description }}</option>
          {% endfor %}
        </select>
      </div>


      <div class="mb-3">
        <label class="form-label">Select PO</label>
        <select name="po_id" class="form-select">
          <option value="">Select PO</option>
          {% for po in pos %}
          <option value="{{ po.id }}">{{ po.description }}</option>
          {% endfor %}
        </select>
      </div>


      <div class="mb-3">
        <label class="form-label">Mapping Level (1 = Low, 2 = Medium, 3 = High)</label>
        <input type="number" name="level" min="1" max="3" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary">Map CO to PO</button>
      <a href="/" class="btn btn-secondary">Back</a>

    </form>

  </div>
</div>

</body>
</html>
