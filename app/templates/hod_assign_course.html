<!DOCTYPE html>
<html>
<head>
  <title>Assign Teacher to Course</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:600px;">
  <h2>Assign Teacher to Course</h2>
  
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mt-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" class="mt-4">

    <div class="mb-3">
      <label for="batch" class="form-label">Select Batch</label>
      <select class="form-select" name="batch_id" id="batch" required>
        <option value="" disabled selected>Select Batch</option>
        {% for batch in batches %}
          <option value="{{ batch.id }}">{{ batch.batch }}</option>
        {% endfor %}
      </select>
    </div>
    

    <div class="mb-3">
      <label for="course" class="form-label">Select Course</label>
      <select class="form-select" name="course_id" id="course" required>
        <option value="" disabled selected>Select a course</option>
        {% for course in courses %}
          <option value="{{ course.id }}">{{ course.code }} - {{ course.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="faculty" class="form-label">Select Faculty</label>
      <select class="form-select" name="faculty_id" id="faculty" required>
        <option value="" disabled selected>Select a faculty</option>
        {% for f in faculty %}
          <option value="{{ f.id }}">{{ f.username }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="session" class="form-label">Select Academic Session</label>
      <select class="form-select" name="session_id" id="session" required>
        <option value="" disabled selected>Select a session</option>
        {% for s in sessions %}
          <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="btn btn-primary w-100">Assign</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
