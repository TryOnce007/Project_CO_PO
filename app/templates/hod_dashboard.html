<!DOCTYPE html>
<html>
<head>
  <title>HOD Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <h2>HOD Dashboard</h2>
  <div class="dropdown">
        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          👤
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="{{ url_for('profile.profile') }}">Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}">Logout</a></li>
        </ul>
      </div>
  <div class="row mt-4 g-3">
    <div class="col-md-4">
      <a href="{{ url_for('hod_bp.add_teacher') }}" class="btn btn-primary w-100 p-4">
        Add New Teacher
      </a>
    </div>
    <div class="col-md-6">
      <a href="{{ url_for('student_bp.add_student') }}" class="btn btn-info w-100 p-4">
        Add Student
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('hod_bp.add_po') }}" class="btn btn-success w-100 p-4">
        Add Program Outcome
      </a>
    </div>

    <div class="col-md-4">
      <a href="{{ url_for('co_po_bp.map_co_po') }}" class="btn btn-success w-100 p-4">
        Map CO_PO
      </a>
    </div>

    <div class="col-md-4">
      <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-success w-100 p-4">
        Dashboard
      </a>
    </div>

    <div class="col-md-4">
      <a href="{{ url_for('po.select_course_for_po') }}" class="btn btn-success w-100 p-4">
        CO Analysis
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('course_bp.add_course') }}" class="btn btn-warning w-100 p-4">
        Add Course
      </a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('hod_bp.add_session') }}" class="btn btn-dark w-100 p-4">
            Add Academic Session
        </a>
    </div>
    <div class="col-md-6">
      <a href="{{ url_for('hod_bp.assign_course') }}" class="btn btn-info w-100 p-4">
        Assign Teacher to Course
      </a>
    </div>
    <div class="col-md-6">
      <a href="{{ url_for('hod_bp.view_assignments') }}" class="btn btn-secondary w-100 p-4">
        View Course Assignments
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
