<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Course for PO Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <div class="container mt-5">
    <h3 class="mb-4">Select Course for PO Attainment Analysis</h3>

    <form method="GET" action="{{ url_for('po.po_attainment_course') }}">


      <div class="mb-3">
        <label for="sessionSelect" class="form-label">Session</label>

        <select id="sessionSelect" name="session_id" class="form-select" required>
          <option value="">-- Select Session --</option>

          {% for session in sessions %}
            <option value="{{ session.id }}">
              {{ session.name }}
            </option>
          {% endfor %}

        </select>
      </div>


      <div class="mb-3">
        <label for="courseSelect" class="form-label">Course</label>

        <select id="courseSelect" name="course_id" class="form-select" required>
          <option value="">-- Select Course --</option>

          {% for course in courses %}
            <option value="{{ course.id }}">
              {{ course.name }}
            </option>
          {% endfor %}

        </select>
      </div>

      <button type="submit" class="btn btn-primary">
        View PO Attainment
      </button>

    </form>
  </div>
</body>
</html>
