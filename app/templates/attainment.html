<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CO Attainment Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #f8f9fa; }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        .attainment-level-3 { background-color: #d1e7dd; font-weight: bold; }
        .attainment-level-2 { background-color: #fff3cd; font-weight: bold; }
        .attainment-level-1 { background-color: #f8d7da; font-weight: bold; }
        .attainment-level-0 { background-color: #f5c2c7; font-weight: bold; }
        .no-data { background-color: #e2e3e5; font-style: italic; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">📊 CO Attainment Report</h2>

        <table class="table table-bordered table-hover">
            <form method="GET" action="{{ url_for('co_bp.attainment') }}" class="mb-4">

                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Select Course</label>

                        <select name="course_id" class="form-select" onchange="this.form.submit()" required>
                            <option value="">-- Select Course --</option>

                            {% for c in courses %}
                            <option value="{{ c.id }}"
                                {% if selected_course_id == c.id %}selected{% endif %}>
                                {{ c.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

            </form>
            <thead class="table-light">
                <tr class="text-center">
                    <th>CO</th>
                    <th>Description</th>
                    <th>Attainment Level</th>
                    <th>Average %</th>
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                    <tr class="text-center
                        {% if row.level == 3 %} attainment-level-3
                        {% elif row.level == 2 %} attainment-level-2
                        {% elif row.level == 1 %} attainment-level-1
                        {% elif row.level == 0 %} attainment-level-0
                        {% else %} no-data {% endif %}
                    ">
                        <td>CO{{ row.co.id }}</td>
                        <td class="text-start">{{ row.co.description }}</td>
                        <td>{% if row.level != 'No data' %}Level {{ row.level }}{% else %}No data{% endif %}</td>
                        <td>{{ row.percentage }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <hr class="my-5">

        <h4 class="mb-3 text-center">📈 CO Attainment Chart</h4>
        <canvas id="attainmentChart" height="100"></canvas>

        <div class="mt-4 text-end">
            <a href="{{ url_for('auth.index') }}" class="btn btn-secondary">⬅ Back to Dashboard</a>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('attainmentChart').getContext('2d');
        const attainmentChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [{% for row in data %}'CO{{ row.co.id }}'{% if not loop.last %}, {% endif %}{% endfor %}],
                datasets: [{
                    label: 'Attainment %',
                    data: [{% for row in data %}{{ row.percentage if row.percentage != 'N/A' else 0 }}{% if not loop.last %}, {% endif %}{% endfor %}],
                    backgroundColor: '#0d6efd',
                    borderColor: '#0a58ca',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: {
                            display: true,
                            text: 'Percentage'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
