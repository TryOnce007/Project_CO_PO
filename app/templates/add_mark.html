<!DOCTYPE html>
<html>
<head>
    <title>Marks Grid Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3 class="text-center mb-4">📝 Marks Entry (Grid View)</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="row">

        <div class="col-md-3">
            <label>Batch</label>
            <select id="batchSelect" class="form-select">
                <option disabled selected>Select Batch</option>
                {% for batch in batches %}
                    <option value="{{ batch.id }}">{{ batch.batch }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <label>Branch</label>
            <select id="branchSelect" class="form-select">
                <option disabled selected>Select Branch</option>
                {% for branch in branches %}
                    <option value="{{ branch.code }}">{{ branch.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <label>Course</label>
            <select id="courseSelect" class="form-select">
                <option disabled selected>Select Course</option>
                {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <label>CO</label>
            <select id="coSelect" class="form-select">
                <option disabled selected>Select CO</option>
            </select>
        </div>

    </div>

    <div class="row mt-3">
        <div class="col-md-3">
            <label>Session</label>
            <select id="sessionSelect" class="form-select">
                <option disabled selected>Select Session</option>
                {% for session in sessions %}
                    <option value="{{ session.id }}">{{ session.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- TABLE -->
    <div class="mt-4">
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Total Marks</th>
                    <th>Obtained Marks</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>

</div>

<script>

document.getElementById('courseSelect').addEventListener('change', function () {
    fetch(`/get_cos?course_id=${this.value}`)
        .then(res => res.json())
        .then(data => {
            const coSelect = document.getElementById('coSelect');
            coSelect.innerHTML = '<option disabled selected>Select CO</option>';

            data.forEach(co => {
                coSelect.innerHTML += `<option value="${co.id}">${co.description}</option>`;
            });
        });
});

function loadGrid() {

    const batch = document.getElementById('batchSelect').value;
    const branch = document.getElementById('branchSelect').value;
    const co_id = document.getElementById('coSelect').value;
    const session = document.getElementById('sessionSelect').value;

    if (!batch || !branch || !co_id || !session) return;

    fetch(`/get_student_marks_grid?batch=${batch}&branch=${branch}&co_id=${co_id}&session=${session}`)
        .then(res => res.json())
        .then(data => {

            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = "";

            data.forEach(row => {

                tbody.innerHTML += `
                <tr>
                    <td>${row.roll_no}</td>
                    <td>${row.name}</td>

                    <td>
                        <input type="number"
                               class="form-control total-${row.student_id}"
                               value="${row.total || ''}">
                    </td>

                    <td>
                        <input type="number"
                               class="form-control obtained-${row.student_id}"
                               value="${row.obtained || ''}">
                    </td>

                    <td>
                        <button class="btn btn-primary btn-sm"
                            onclick="saveRow(${row.student_id}, ${row.mark_id || 'null'}, ${co_id}, ${session})">
                            Save
                        </button>
                    </td>
                </tr>
                `;
            });
        });
}

function saveRow(student_id, mark_id, co_id, session) {

    const total = document.querySelector(`.total-${student_id}`).value;
    const obtained = document.querySelector(`.obtained-${student_id}`).value;

    if (!total || !obtained) {
        alert("Please enter marks");
        return;
    }

    if (parseFloat(total) < 0) {
        alert("Total marks cannot be negative");
        return;
    }

    if (parseFloat(obtained) > parseFloat(total)) {
        alert("Obtained marks cannot be greater than total marks");
        return;
    }

    fetch('/save_mark_row', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            student_id,
            mark_id,
            co_id,
            session,
            total,
            obtained
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Saved successfully");
        loadGrid();
    });
}

document.getElementById('batchSelect').addEventListener('change', loadGrid);
document.getElementById('branchSelect').addEventListener('change', loadGrid);
document.getElementById('coSelect').addEventListener('change', loadGrid);
document.getElementById('sessionSelect').addEventListener('change', loadGrid);

</script>

</body>
</html>
