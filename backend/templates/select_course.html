<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Course for PO Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-header {
      background: #ffffff;
      border-bottom: 1px solid #dee2e6;
      padding: 12px 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .header-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      height: 45px;
    }

    .title-box {
      display: flex;
      flex-direction: column;
    }

    .header-title {
      font-weight: 600;
      font-size: 18px;
      color: #333;
    }

    .company-name {
      font-size: 13px;
      color: #6c757d;
    }

    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border: 1px solid #ddd;
      padding: 25px;
    }

    h3 {
      font-weight: normal;
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-neutral {
      background: #e9e9e9;
      border: 1px solid #ccc;
      color: #333;
    }

    .btn-neutral:hover {
      background: #ddd;
    }

    footer {
      border-top: 1px solid #ddd;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      color: #666;
      background: #fafafa;
    }
  </style>
</head>

<body>

  <div class="main-header">
    <div class="container header-wrap">

      <div class="d-flex align-items-center gap-2">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

        <div class="title-box">
          <div class="header-title">OBE Management System</div>
          <div class="company-name">Bundelkhand Institute of Engineering and Technology</div>
        </div>
      </div>

      <div class="text-muted small">
        Course Selection
      </div>

    </div>
  </div>

<div class="content">

  <div class="box">

    <h3>Select Course for PO Analysis</h3>

    <form method="GET" action="{{ url_for('po.po_attainment_course') }}">

      <div class="mb-3">
        <label class="form-label">Session</label>
        <select name="session_id" class="form-select" required>
          <option value="">-- Select Session --</option>
          {% for session in sessions %}
            <option value="{{ session.id }}">{{ session.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Course</label>
        <select name="course_id" class="form-select" required>
          <option value="">-- Select Course --</option>
          {% for course in courses %}
            <option value="{{ course.id }}">{{ course.name }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="btn btn-neutral w-100 mb-2">
        View PO Attainment
      </button>

      <a href="{{ url_for('auth.index') }}"
         class="btn btn-neutral w-100">
        Back
      </a>

    </form>

  </div>

</div>

<footer class="bg-dark text-light pt-4 pb-3">
    <div class="container text-center">

      <h6 class="mb-2">CO-PO Attainment System</h6>

      <p class="small mb-0">
        Outcome-Based Education (OBE) platform for CO-PO analysis and academic insights.
      </p>

      <hr class="bg-secondary">

      <p class="small mb-0">
        © 2026 CO-PO Attainment System | All Rights Reserved
      </p>

    </div>
  </footer>

</body>
</html>
